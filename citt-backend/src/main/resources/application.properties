# --- CONFIGURACION DEL SERVIDOR ---
server.port=8080
spring.application.name=backend

# --- CONFIGURACION BASE DE DATOS (PostgreSQL) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cittdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- CONFIGURACION JWT (Seguridad) ---
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# --- CONFIGURACION DE CORREO (Brevo API REST) ---
brevo.api-key=${BREVO_API_KEY:}

# --- CONFIGURACION DOMINIOS INSTITUCIONALES ---
app.dominios.alumno=@duocuc.cl
app.dominios.docente=@profesor.duoc.cl
app.dominios.manual=@duoc.cl

# --- DESACTIVAR ADVERTENCIAS DE JPA (Opcional) ---.
spring.jpa.open-in-view=false

