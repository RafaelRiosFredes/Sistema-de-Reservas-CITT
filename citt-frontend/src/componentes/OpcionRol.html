<!-- OPCIÓN DE SELECCIÓN DE ROL (Para Modales) -->

<!--
  IMPORTANTE: Cuando el usuario seleccione una opción mediante JavaScript,
  se debe agregar la clase 'seleccionado' para que se ilumine en azul Duoc.
-->
<div class="opcion-rol seleccionado">
    <!-- ICONO: Representación visual del rol (Ej: fa-user-graduate, fa-chalkboard-teacher) -->
    <i class="fas fa-user-graduate"></i>

    <!-- NOMBRE: Título descriptivo del rol en Lato Bold -->
    <span class="nombre-rol">Alumno</span>
</div>
