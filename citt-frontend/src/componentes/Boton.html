<!-- BOTONES ESTILO CITT / DUOC UC -->

<!--
  USO: Para acciones definitivas y positivas. Ejemplo: "Solicitar Equipo", "Guardar Cambios".
  COLOR: Azul Duoc Primario (#307FE2).
-->
<button class="boton boton-primario">
    Confirmar Acción
</button>

<!--
  USO: Para acciones de retroceso o descarte. Ejemplo: "Cancelar", "Volver", "Cerrar".
  COLOR: Celeste de apoyo (#8BB8E8).
-->
<button class="boton boton-secundario">
    Cancelar
</button>

<!--
  USO: Diseñado para formularios de Login o Modales donde el botón debe resaltar al máximo.
  CARACTERÍSTICA: Ocupa el 100% del ancho disponible de su contenedor.
-->
<button class="boton boton-primario boton-bloque">
    Iniciar Sesión
</button>
