<head>
  <meta charset="UTF-8">
  <!-- El "../" es la clave: sale de 'componentes' para entrar a 'src' -->
  <link rel="stylesheet" href="../index.css">
</head>


<!-- GRUPO DE FORMULARIO -->
<div class="grupo-formulario">
  <!-- ETIQUETA: Siempre encima del campo, indica qué debe ingresar el usuario -->
  <label class="etiqueta-formulario">Correo Institucional</label>

  <!-- CAMPO DE ENTRADA: Con validación de tipo y placeholder descriptivo -->
  <input
          type="email"
          class="entrada-formulario"
          placeholder="usuario@duocuc.cl"
  >

  <!-- OPCIONAL: Texto de ayuda o error que puede aparecer debajo -->
  <!-- <span class="ayuda-formulario">* Ingrese su correo @duocuc.cl</span> -->
</div>
