<!-- ETIQUETAS DE ESTADO (Badges) -->

<!--
  USO: Se usa en tarjetas de inventario para indicar que el equipo puede ser solicitado.
  COLOR: Fondo verde esmeralda suave con texto verde oscuro.
-->
<span class="etiqueta-estado estado-disponible">Disponible</span>

<!--
  USO: Indica que el equipo está actualmente en préstamo a un alumno o docente.
  COLOR: Fondo rojo coral suave con texto rojo oscuro.
-->
<span class="etiqueta-estado estado-ocupado">En Uso</span>

<!--
  USO: Indica que el equipo tiene fallas técnicas o está en revisión por el CITT.
  COLOR: Fondo naranja suave con texto naranja oscuro.
-->
<span class="etiqueta-estado estado-mantenimiento">Mantenimiento</span>
