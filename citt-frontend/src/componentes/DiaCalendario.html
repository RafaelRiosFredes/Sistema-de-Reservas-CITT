<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../index.css">
</head>


<!-- CELDA DE CALENDARIO -->
<div class="celda-calendario">
  <!-- NÚMERO: Identificador del día, siempre fijo arriba a la izquierda -->
  <span class="numero-dia">15</span>

  <!-- CONTENIDO: Espacio para mostrar reservas o eventos del día -->
  <div class="contenido-dia">
    <!-- Ejemplo: Se puede incluir una etiqueta de estado pequeña -->
    <span class="etiqueta-estado estado-reservado" style="font-size: 0.6rem; padding: 0.2rem 0.4rem;">
        Reservado
    </span>
  </div>
</div>
