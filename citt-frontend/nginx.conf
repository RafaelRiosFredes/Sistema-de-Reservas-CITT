server {
    listen 5173;
    server_name localhost;

    # Dónde están los archivos estáticos de React
    root /usr/share/nginx/html;
    index index.html;

    # 1. Configuración principal de React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy inverso para el Backend
    # Redirige todo lo que empiece con /api/ hacia el contenedor del backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Opciones útiles para CORS y tiempos de espera.
        # proxy_connect_timeout 60s;
        # proxy_read_timeout 60s;
    }

    # Opcional: Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
